spring:
  application:
    name: product-api

  # ── H2 in-memory database (default — works instantly, no setup needed) ──
  datasource:
    url: jdbc:h2:mem:productdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

---
# ── PostgreSQL profile ──────────────────────────────────────────────
# To use PostgreSQL instead of H2, run:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
#
# Before that, set up PostgreSQL:
#   1. Install PostgreSQL on your machine
#   2. Create the database: psql -U postgres -c "CREATE DATABASE productdb;"
#   3. If your credentials are different, override them:
#      SPRING_DATASOURCE_USERNAME=myuser SPRING_DATASOURCE_PASSWORD=mypass ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:manikanta}
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
