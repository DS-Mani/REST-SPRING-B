spring:
  application:
    name: product-api

  # ── PostgreSQL (default database) ──────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
