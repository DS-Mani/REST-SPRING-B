spring:
  application:
    name: product-api

  # ── H2 in-memory database (default — works instantly, no setup needed) ──
  datasource:
    url: jdbc:h2:mem:productdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

---
# ── PostgreSQL profile ──────────────────────────────────────────────
# To use PostgreSQL instead of H2, run:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
#
# Before that, set up PostgreSQL:
#   1. Install PostgreSQL on your machine
#   2. Open terminal: psql -U postgres
#   3. Run: CREATE DATABASE productdb;
#   4. If your password is different, change it below
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
